<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Coming Soon</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><radialGradient id='g' cx='38%25' cy='33%25' r='65%25'><stop offset='0%25' stop-color='%23E8402F'/><stop offset='50%25' stop-color='%23C0281F'/><stop offset='100%25' stop-color='%236B0C08'/></radialGradient></defs><circle cx='16' cy='16' r='15' fill='url(%23g)'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,600;0,700;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: #080809;
      color: #EAE6DE;
      font-family: 'Cormorant Garamond', Georgia, serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Grain texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
    }

    /* Subtle warm glow at bottom center — matches reference */
    body::after {
      content: '';
      position: fixed;
      bottom: -120px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 360px;
      background: radial-gradient(ellipse at center, rgba(180, 30, 20, 0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Thin frame border */
    .frame {
      position: fixed;
      inset: 24px;
      border: 1px solid rgba(234, 230, 222, 0.08);
      pointer-events: none;
      z-index: 1;
    }

    /* Center stage */
    .center {
      text-align: center;
      position: relative;
      z-index: 2;
      padding: 40px 20px;
      max-width: 900px;
      width: 100%;
    }

    /* ── Keyframes ── */
    @keyframes revealUp {
      from { transform: translateY(108%); }
      to   { transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes scaleDot {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    @keyframes expandLine {
      from { transform: scaleX(0); }
      to   { transform: scaleX(1); }
    }

    /* Small red accent dot */
    .dot {
      width: 6px;
      height: 6px;
      background: #C0281F;
      border-radius: 50%;
      margin: 0 auto 52px;
      box-shadow: 0 0 12px rgba(192, 40, 31, 0.6);
      animation: scaleDot 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
    }

    /* Main heading — massive, bold serif */
    h1 {
      font-family: 'Cormorant', Georgia, serif;
      font-weight: 700;
      font-size: clamp(52px, 9.5vw, 112px);
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: #EAE6DE;
      line-height: 0.92;
      margin-bottom: 40px;
      text-shadow:
        0 2px 40px rgba(0, 0, 0, 0.6),
        0 0 1px rgba(234, 230, 222, 0.3);
    }

    /* Clip mask per line */
    .line-wrap {
      display: block;
      overflow: hidden;
      padding-bottom: 0.06em;
    }

    .line-wrap .line {
      display: block;
      animation: revealUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .line-wrap:nth-child(1) .line { animation-delay: 0.3s; }
    .line-wrap:nth-child(2) .line { animation-delay: 0.52s; }

    /* Thin divider */
    .divider {
      width: 32px;
      height: 1px;
      background: rgba(234, 230, 222, 0.2);
      margin: 0 auto 36px;
      transform-origin: center;
      animation: expandLine 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
    }

    /* Tagline */
    .tagline {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(16px, 1.8vw, 22px);
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.03em;
      color: rgba(234, 230, 222, 0.45);
      line-height: 1.5;
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.05s both;
    }

    /* Social links */
    .socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-top: 48px;
    }

    .socials a:nth-child(1) { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.25s both; }
    .socials a:nth-child(2) { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.35s both; }
    .socials a:nth-child(3) { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.45s both; }
    .socials a:nth-child(4) { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.55s both; }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      color: rgba(234, 230, 222, 0.65);
      transition: color 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-decoration: none;
    }

    .socials a:hover {
      color: rgba(234, 230, 222, 0.9);
      transform: translateY(-3px);
    }

    .socials a:active {
      transform: translateY(0px);
    }

    .socials a:focus-visible {
      outline: 1px solid rgba(192, 40, 31, 0.6);
      outline-offset: 4px;
      border-radius: 2px;
    }

    .socials svg {
      width: 18px;
      height: 18px;
    }

    .socials a:nth-child(5) { animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) 1.65s both; }

    .socials .agency-link {
      width: auto;
      height: auto;
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 0 4px 24px;
      margin-left: 4px;
      border-left: 1px solid rgba(234, 230, 222, 0.12);
    }

    /* CTA Button */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 40px;
      padding: 15px 40px;
      font-family: 'Cormorant', Georgia, serif;
      font-size: clamp(13px, 1.2vw, 15px);
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-decoration: none;
      color: rgba(234, 230, 222, 0.85);
      border: 1px solid rgba(234, 230, 222, 0.2);
      border-radius: 1px;
      position: relative;
      overflow: hidden;
      transition: color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  border-color 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  box-shadow 0.4s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 1.1s both;
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #C0281F 0%, #8B1010 100%);
      transform: translateX(-105%);
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 0;
    }

    .cta-btn span, .cta-btn .arrow {
      position: relative;
      z-index: 1;
    }

    .cta-btn .arrow {
      width: 14px;
      height: 14px;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .cta-btn:hover {
      color: #EAE6DE;
      border-color: transparent;
      box-shadow: 0 8px 32px rgba(192, 40, 31, 0.35), 0 0 0 1px rgba(192, 40, 31, 0.5);
      transform: translateY(-1px);
    }

    .cta-btn:hover::before { transform: translateX(0); }

    .cta-btn:hover .arrow { transform: translateX(4px); }

    .cta-btn:active {
      transform: translateY(0) scale(0.98);
      transition: transform 0.1s ease;
    }

    .cta-btn:focus-visible {
      outline: 1px solid rgba(192, 40, 31, 0.7);
      outline-offset: 4px;
    }
  </style>
</head>
